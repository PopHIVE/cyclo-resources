on:
  schedule:
    # 2am ET (07:00 UTC; during EDT this runs at 3am)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update-daily-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      KINSA_EMAIL: ${{ secrets.KINSA_EMAIL }}
      KINSA_PASSWORD: ${{ secrets.KINSA_PASSWORD }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev libudunits2-dev libproj-dev libgdal-dev libgeos-dev libmagick++-dev tesseract-ocr libtesseract-dev libleptonica-dev
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::dplyr
            any::tidyr
            any::httr
            any::httr2
            any::xml2
            any::rvest
            any::purrr
            any::terra
            any::exactextractr
            any::sf
            any::tigris
            any::vroom
            any::arrow
            any::jsonlite
            any::knitr
            any::rmarkdown
            any::plotly
            any::scales
            any::viridisLite
            any::magick
            any::tesseract
            github::dissc-yale/dcf
          cache-version: 1
      - uses: quarto-dev/quarto-actions/setup@v2
      - run: Rscript -e "dcf::dcf_process('fl_cyclo')"
      - run: Rscript -e "dcf::dcf_process('in_cyclo')"
      - run: Rscript -e "dcf::dcf_process('mi_cyclo')"
      - run: Rscript -e "dcf::dcf_process('oh_cyclo')"
      - run: Rscript -e "dcf::dcf_process('wv_cyclo')"
      - run: Rscript -e "dcf::dcf_process('ky_cyclo_news')"

      - name: Render index.qmd
        run: quarto render index.qmd

      - id: diff
        run: |
          if git diff --exit-code; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - if: ${{ steps.diff.outputs.changed == 'true' }}
        name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "scheduled daily data update"
          git push
